name: Auto Release on Main

on:
  workflow_dispatch:

jobs:
  auto-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Gather git info ────────────────────────────────────────────
      - name: Gather git info
        id: git_info
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"%s")
          else
            LOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
          fi

          # Store multiline log safely
          EOF=$(openssl rand -hex 8)
          echo "commits<<$EOF"  >> $GITHUB_OUTPUT
          echo "$LOG"           >> $GITHUB_OUTPUT
          echo "$EOF"           >> $GITHUB_OUTPUT

      # ── Step 2: Generate version and release notes via Claude ──────────────
      - name: Generate version and release notes
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(echo *),Bash(tee *),Bash(cat *),Bash(python3 *)"
          prompt: |
            You are a release manager for a software project.

            Last release tag: ${{ steps.git_info.outputs.last_tag || 'none (first release)' }}
            Commits since last release:
            ${{ steps.git_info.outputs.commits }}

            ## Your task:

            1. Determine the next semantic version (MAJOR.MINOR.PATCH):
               - feat!: / BREAKING CHANGE → bump MAJOR (no previous tag → start at 1.0.0)
               - feat:                    → bump MINOR (no previous tag → start at 0.1.0)
               - fix: / chore: / etc.     → bump PATCH (no previous tag → start at 0.0.1)

            2. Write release notes in Markdown using these categories (omit empty ones):
               ### Added
               ### Changed
               ### Fixed
               ### Breaking Changes
               ### Full Changelog
               `${{ steps.git_info.outputs.last_tag || 'initial' }}...v{new_version}`

            3. Write the result to /tmp/release_output.json using this exact command:
               python3 -c "
               import json
               data = {
                 'version': 'X.Y.Z',
                 'description': '''your markdown here'''
               }
               with open('/tmp/release_output.json', 'w') as f:
                   json.dump(data, f)
               "

               Replace X.Y.Z and the description with the actual values.
               The file must contain valid JSON with exactly two keys: version and description.

      # ── Step 3: Parse Claude output ────────────────────────────────────────
      - name: Parse version and description
        id: parse
        run: |
          if [[ ! -f /tmp/release_output.json ]]; then
            echo "❌ /tmp/release_output.json not found"
            exit 1
          fi

          echo "=== Claude output ==="
          cat /tmp/release_output.json

          VERSION=$(jq -r '.version' /tmp/release_output.json)
          DESCRIPTION=$(jq -r '.description' /tmp/release_output.json)

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "❌ Could not parse version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          EOF=$(openssl rand -hex 8)
          echo "description<<$EOF"  >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION"       >> "$GITHUB_OUTPUT"
          echo "$EOF"               >> "$GITHUB_OUTPUT"

          echo "✅ New version: $VERSION"

      # ── Step 4: Bump version in Cargo.toml ────────────────────────────────
      - name: Update version in Cargo.toml
        run: |
          NEW_VERSION="${{ steps.parse.outputs.version }}"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml

          echo "--- Updated Cargo.toml snippet ---"
          grep '^version' Cargo.toml | head -5

      - name: Commit updated Cargo.toml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to v${{ steps.parse.outputs.version }} [skip ci]"
          git push

      # ── Step 5: Create draft GitHub release ───────────────────────────────
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.parse.outputs.version }}"

          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "${{ steps.parse.outputs.description }}" \
            --draft \
            --target main

          echo "✅ Draft release $VERSION created."
