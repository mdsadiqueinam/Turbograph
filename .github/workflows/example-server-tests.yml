name: Example Server Tests

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:

jobs:
  example-server-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Aa123456
          POSTGRES_DB: app-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app-db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:Aa123456@localhost:5432/app-db
      GRAPHQL_URL: http://localhost:4000/graphql

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize database schema and seed data
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Start example server in background
        run: |
          cargo run --manifest-path examples/server/Cargo.toml --lockfile-path Cargo.lock > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for /graphql endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS "$GRAPHQL_URL" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          cat server.log
          exit 1

      - name: Run HTTP E2E tests
        run: cargo test --manifest-path examples/server/Cargo.toml --test e2e_http_tests --lockfile-path Cargo.lock --locked -- --test-threads=1 --nocapture

      - name: Stop example server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
          cat server.log || true
