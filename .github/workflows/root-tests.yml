name: Root Tests

on:
  push:
  pull_request:

jobs:
  root-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Aa123456
          POSTGRES_DB: app-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app-db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:Aa123456@localhost:5432/app-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize database schema and seed data
        run: psql "$DATABASE_URL" -f db/init.sql

      - name: Run root crate tests
        run: cargo test --package turbograph --lib --tests --locked
