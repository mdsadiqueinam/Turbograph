name: Test

on:
  push:
    branches: [main]

jobs:
  graphql-integration-tests:
    name: GraphQL integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Aa123456
          POSTGRES_DB: app-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Apply database schema and seed data
        run: |
          PGPASSWORD=Aa123456 psql \
            -h localhost -p 5432 -U postgres -d app-db \
            -f db/init.sql

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run GraphQL integration tests
        env:
          DATABASE_URL: postgres://postgres:Aa123456@localhost:5432/app-db
        run: cargo test --test graphql_tests --manifest-path examples/server/Cargo.toml
