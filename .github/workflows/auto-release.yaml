name: Auto Release on Main

on:
  workflow_dispatch:

jobs:
  auto-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Gather git info ────────────────────────────────────────────
      - name: Gather git info
        id: git_info
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"%s")
          else
            LOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
          fi

          EOF=$(openssl rand -hex 8)
          echo "commits<<$EOF"  >> $GITHUB_OUTPUT
          echo "$LOG"           >> $GITHUB_OUTPUT
          echo "$EOF"           >> $GITHUB_OUTPUT

      # ── Step 2: Claude generates structured JSON output ───────────────────
      - name: Generate version and release notes
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --allowedTools ""
          prompt: |
            You are a release manager for a software project.

            Last release tag: ${{ steps.git_info.outputs.last_tag || 'none (first release)' }}
            Commits since last release:
            ${{ steps.git_info.outputs.commits }}

            ## Your task:

            1. Determine the next semantic version (MAJOR.MINOR.PATCH):
               - feat!: / BREAKING CHANGE → bump MAJOR (no previous tag → start at 1.0.0)
               - feat:                    → bump MINOR (no previous tag → start at 0.1.0)
               - fix: / chore: / etc.     → bump PATCH (no previous tag → start at 0.0.1)

            2. Write release notes in Markdown using these categories (omit empty ones):
               ### Added
               ### Changed
               ### Fixed
               ### Breaking Changes
               ### Full Changelog
               `${{ steps.git_info.outputs.last_tag || 'initial' }}...v{new_version}`

            3. Respond with ONLY a raw JSON object — no markdown fences, no explanation,
               no extra text before or after. The JSON must have exactly two keys:
               {
                 "version": "X.Y.Z",
                 "description": "release notes with \\n for newlines"
               }

      # ── Step 3: Parse Claude output from execution file ───────────────────
      - name: Parse version and description
        id: parse
        run: |
          EXECUTION_FILE="/home/runner/work/_temp/claude-execution-output.json"
 
          echo "=== Claude execution file ==="
          cat "$EXECUTION_FILE"

          # Parse as JSON array, find type=result, then parse .result string as JSON
          VERSION=$(jq -r '.[] | select(.type == "result") | .result | fromjson | .version' "$EXECUTION_FILE")
          DESCRIPTION=$(jq -r '.[] | select(.type == "result") | .result | fromjson | .description' "$EXECUTION_FILE")

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "❌ Could not parse version from Claude output"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          EOF=$(openssl rand -hex 8)
          echo "description<<$EOF"  >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION"       >> "$GITHUB_OUTPUT"
          echo "$EOF"               >> "$GITHUB_OUTPUT"

          echo "✅ New version: $VERSION"

      # ── Step 4: Bump version in Cargo.toml ────────────────────────────────
      - name: Update version in Cargo.toml
        run: |
          NEW_VERSION="${{ steps.parse.outputs.version }}"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" Cargo.toml

          echo "--- Updated Cargo.toml snippet ---"
          grep '^version' Cargo.toml | head -5

      - name: Commit updated Cargo.toml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add Cargo.toml
      
          # Check if anything actually changed
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
      
          git commit -m "chore: bump version to v${{ steps.parse.outputs.version }} [skip ci]"
      
          # Ensure we're on main (not detached HEAD)
          git branch --show-current || git checkout main
      
          # Pull latest changes to avoid rejection
          git pull --rebase origin main
      
          # Push safely
          git push origin main

      # ── Step 5: Create draft GitHub release ───────────────────────────────
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESCRIPTION: ${{ steps.parse.outputs.description }}
        run: |
          VERSION="v${{ steps.parse.outputs.version }}"

          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "$DESCRIPTION" \
            --draft \
            --target main

          echo "✅ Draft release $VERSION created."
